- type: entity
  id: DoneIcons
  abstract: true
  suffix: "development plan"
  components:
  - type: Sprite
    sprite: _StarryPole/developmentplan.rsi
    state: done

- type: entity
  id: PannedIcons
  abstract: true
  components:
  - type: Sprite
    sprite: _StarryPole/developmentplan.rsi
    state: panned

- type: entity
  id: PendingIcons
  abstract: true
  components:
  - type: Sprite
    sprite: _StarryPole/developmentplan.rsi
    state: pending
