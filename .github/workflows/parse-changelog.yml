name: Parse Changelog from PR

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [master, main]

jobs:
  parse-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get PR details
        id: pr-details
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_USER="${{ github.event.pull_request.user.login }}"
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          
          echo "PR_NUMBER=${PR_NUMBER}" >> $GITHUB_ENV
          echo "PR_URL=${PR_URL}" >> $GITHUB_ENV
          echo "PR_TITLE=${PR_TITLE}" >> $GITHUB_ENV
          echo "PR_USER=${PR_USER}" >> $GITHUB_ENV
          echo "PR_BRANCH=${PR_BRANCH}" >> $GITHUB_ENV
          
          # Сохраняем тело PR во временный файл для дальнейшей обработки
          echo "${PR_BODY}" > pr_body.txt
          
          echo "PR branch: ${PR_BRANCH}"

      - name: Extract changelog from PR
        id: extract-changelog
        run: |
          # Ищем начало changelog с :cl: и конец перед авто-комментарием
          RAW_CHANGELOG=$(cat pr_body.txt | awk '/:cl:/{flag=1; next} /<!-- This is an auto-generated comment/{flag=0} flag')
          
          if [ -z "$RAW_CHANGELOG" ]; then
            echo "No changelog found in PR"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Удаляем все HTML комментарии (<!-- ... -->)
          CLEAN_CHANGELOG=$(echo "$RAW_CHANGELOG" | sed 's/<!--.*-->//g' | sed '/^[[:space:]]*$/d')
          
          # Удаляем строки с примерами (они содержат add/remove/tweak/fix внутри комментариев)
          # Но оставляем реальные изменения
          CLEAN_CHANGELOG=$(echo "$CLEAN_CHANGELOG" | grep -v "^[[:space:]]*- add: Добавлено веселье!" | \
                                                     grep -v "^[[:space:]]*- remove: Удалено веселье!" | \
                                                     grep -v "^[[:space:]]*- tweak: Изменено веселье!" | \
                                                     grep -v "^[[:space:]]*- fix: Исправлено веселье!")
          
          # Если после очистки ничего не осталось
          if [ -z "$CLEAN_CHANGELOG" ]; then
            echo "No valid changelog entries after cleaning"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "found=true" >> $GITHUB_OUTPUT
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CLEAN_CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "Extracted and cleaned changelog:"
          echo "$CLEAN_CHANGELOG"

      - name: Parse changelog entries
        if: steps.extract-changelog.outputs.found == 'true'
        id: parse-entries
        run: |
          # Показываем весь changelog для отладки
          echo "Full changelog:"
          echo "$CHANGELOG"
          echo "---"
          
          # Находим строку с :cl: (она может быть в любом месте)
          CL_LINE=""
          while IFS= read -r line; do
            if [[ "$line" =~ :cl: ]]; then
              CL_LINE="$line"
              break
            fi
          done <<< "$CHANGELOG"
          
          echo "Found :cl: line: ${CL_LINE}"
          
          # Извлекаем автора из строки с :cl:
          if [ -n "$CL_LINE" ]; then
            # Убираем :cl: и все после него до конца строки, затем убираем комментарии
            AUTHOR=$(echo "$CL_LINE" | sed 's/.*:cl:[[:space:]]*//g' | sed 's/[[:space:]]*$//g' | sed 's/<!--.*//g' | sed 's/-->.*//g' | sed 's/\r//g' | xargs)
            
            # Если автор пустой или содержит только комментарий
            if [ -z "$AUTHOR" ] || [[ "$AUTHOR" == \<!--* ]] || [[ "$AUTHOR" == *--\> ]]; then
              AUTHOR="${{ env.PR_USER }}"
              echo "Author not valid, using PR author: ${AUTHOR}"
            else
              echo "Author extracted from :cl: line: ${AUTHOR}"
            fi
          else
            # Если строка с :cl: не найдена, используем автора PR
            AUTHOR="${{ env.PR_USER }}"
            echo "No :cl: line found, using PR author: ${AUTHOR}"
          fi
          
          # Парсим все строки с изменениями (ищем строки, начинающиеся с -)
          ENTRIES=""
          
          while IFS= read -r line; do
            # Пропускаем пустые строки
            if [ -z "$line" ]; then
              continue
            fi
            
            # Убираем HTML комментарии из строки полностью
            clean_line=$(echo "$line" | sed 's/<!--.*-->//g' | sed 's/<!--.*//g' | sed 's/.*-->//g' | sed 's/\r//g' | xargs)
            
            # Если после очистки строка пустая, пропускаем
            if [ -z "$clean_line" ]; then
              continue
            fi
            
            # Проверяем, начинается ли строка с дефиса (признак изменения)
            if [[ "$clean_line" =~ ^-[[:space:]]* ]]; then
              # Определяем тип изменения
              if [[ "$clean_line" =~ ^-[[:space:]]*add:[[:space:]]*(.*)$ ]]; then
                MESSAGE="${BASH_REMATCH[1]}"
                TYPE="Add"
              elif [[ "$clean_line" =~ ^-[[:space:]]*remove:[[:space:]]*(.*)$ ]]; then
                MESSAGE="${BASH_REMATCH[1]}"
                TYPE="Remove"
              elif [[ "$clean_line" =~ ^-[[:space:]]*tweak:[[:space:]]*(.*)$ ]]; then
                MESSAGE="${BASH_REMATCH[1]}"
                TYPE="Tweak"
              elif [[ "$clean_line" =~ ^-[[:space:]]*fix:[[:space:]]*(.*)$ ]]; then
                MESSAGE="${BASH_REMATCH[1]}"
                TYPE="Fix"
              else
                echo "Skipping unrecognized line: $clean_line"
                continue
              fi
              
              if [ -n "$MESSAGE" ]; then
                # Очищаем сообщение от лишних пробелов, комментариев и \r
                MESSAGE=$(echo "$MESSAGE" | sed 's/<!--.*-->//g' | sed 's/<!--.*//g' | sed 's/.*-->//g' | sed 's/\r//g' | xargs)
                
                # Экранируем кавычки в сообщении
                MESSAGE=$(echo "$MESSAGE" | sed 's/"/\\"/g')
                
                # Добавляем запись в формате для YAML
                ENTRIES="${ENTRIES}  - message: \"${MESSAGE}\"\n    type: ${TYPE}\n"
                
                echo "Parsed: ${TYPE} - ${MESSAGE}"
              fi
            else
              echo "Skipping non-change line: $clean_line"
            fi
          done <<< "$CHANGELOG"
          
          # Проверяем, есть ли хотя бы одна запись
          if [ -z "$ENTRIES" ]; then
            echo "No valid changelog entries found"
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "AUTHOR=${AUTHOR}" >> $GITHUB_OUTPUT
          echo "ENTRIES<<EOF" >> $GITHUB_OUTPUT
          echo -e "$ENTRIES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create directory if not exists
        if: steps.extract-changelog.outputs.found == 'true'
        run: |
          mkdir -p Resources/Changelog

      - name: Update changelog file
        if: steps.extract-changelog.outputs.found == 'true'
        id: update-file
        run: |
          CHANGELOG_FILE="Resources/Changelog/ChangelogStarryPole.yml"
          
          # Создаем файл если не существует
          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "# Changelog StarryPole" > $CHANGELOG_FILE
            echo "# Этот файл автоматически обновляется при добавлении changelog в PR" >> $CHANGELOG_FILE
            echo "" >> $CHANGELOG_FILE
          fi
          
          # Определяем следующий ID
          if [ -f "$CHANGELOG_FILE" ]; then
            # Ищем максимальный ID
            MAX_ID=$(grep -E "^id:" "$CHANGELOG_FILE" | sed 's/id: //g' | sort -n | tail -1 || echo 0)
            NEW_ID=$((MAX_ID + 1))
          else
            NEW_ID=1
          fi
          
          echo "NEW_ID=${NEW_ID}" >> $GITHUB_OUTPUT
          
          # Текущее время в нужном формате
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%S.0000000+00:00")
          
          # Создаем новый файл с правильной структурой YAML
          NEW_ENTRIES_FILE=$(mktemp)
          
          # Формируем новую запись в правильном формате YAML (список элементов)
          echo "- author: ${{ steps.parse-entries.outputs.AUTHOR }}" >> $NEW_ENTRIES_FILE
          echo "  changes:" >> $NEW_ENTRIES_FILE
          echo -e "${{ steps.parse-entries.outputs.ENTRIES }}" >> $NEW_ENTRIES_FILE
          echo "  id: ${NEW_ID}" >> $NEW_ENTRIES_FILE
          echo "  time: '${CURRENT_TIME}'" >> $NEW_ENTRIES_FILE
          echo "  url: ${{ env.PR_URL }}" >> $NEW_ENTRIES_FILE
          echo "" >> $NEW_ENTRIES_FILE
          
          # Создаем временный файл для нового содержимого
          TEMP_FILE=$(mktemp)
          
          # Копируем заголовки если есть
          if [ -f "$CHANGELOG_FILE" ]; then
            # Сохраняем заголовки (строки начинающиеся с #)
            grep "^#" "$CHANGELOG_FILE" > "$TEMP_FILE" 2>/dev/null || true
            echo "" >> "$TEMP_FILE"
          fi
          
          # Добавляем новые записи
          cat "$NEW_ENTRIES_FILE" >> "$TEMP_FILE"
          
          # Добавляем старые записи (без заголовков)
          if [ -f "$CHANGELOG_FILE" ]; then
            grep -v "^#" "$CHANGELOG_FILE" | grep -v "^[[:space:]]*$" >> "$TEMP_FILE" 2>/dev/null || true
          fi
          
          # Заменяем оригинальный файл
          mv "$TEMP_FILE" "$CHANGELOG_FILE"
          
          echo "Changelog updated successfully in $CHANGELOG_FILE"
          echo "Added entry with ID: ${NEW_ID}"

      - name: Commit and push changes
        if: steps.extract-changelog.outputs.found == 'true'
        run: |
          CHANGELOG_FILE="Resources/Changelog/ChangelogStarryPole.yml"
          
          # Получаем имя ветки
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          
          echo "Current branch from event: ${BRANCH_NAME}"
          echo "Current directory: $(pwd)"
          echo "Git status before:"
          git status
          echo "Current branch:"
          git branch --show-current
          
          # Настраиваем git
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Создаем и переключаемся на ветку принудительно
          git checkout -b temp-branch 2>/dev/null || true
          git fetch origin "${BRANCH_NAME}" 2>/dev/null || true
          git checkout "${BRANCH_NAME}" 2>/dev/null || git checkout -b "${BRANCH_NAME}" origin/"${BRANCH_NAME}" 2>/dev/null || git checkout -b "${BRANCH_NAME}"
          
          echo "After checkout:"
          git branch --show-current
          
          # Добавляем файл
          git add "$CHANGELOG_FILE"
          
          # Создаем коммит
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add changelog for PR #${{ env.PR_NUMBER }} [skip ci]"
            
            # Пуш с указанием ветки
            git push origin HEAD:"${BRANCH_NAME}"
            echo "Changes pushed to branch: ${BRANCH_NAME}"
          fi

      - name: Send Discord Webhook
        if: steps.extract-changelog.outputs.found == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping..."
            exit 0
          fi
          
          # Формируем JSON для Discord
          AUTHOR="${{ steps.parse-entries.outputs.AUTHOR }}"
          PR_NUMBER="${{ env.PR_NUMBER }}"
          PR_TITLE="${{ env.PR_TITLE }}"
          PR_URL="${{ env.PR_URL }}"
          PR_USER="${{ env.PR_USER }}"
          NEW_ID="${{ steps.update-file.outputs.NEW_ID }}"
          
          # Формируем список изменений с эмодзи для Discord
          CHANGES=""
          ENTRIES="${{ steps.parse-entries.outputs.ENTRIES }}"
          
          while IFS= read -r line; do
            if [[ "$line" =~ message:[[:space:]]*\"(.*)\"[[:space:]]*type:[[:space:]]*(.*) ]]; then
              MESSAGE="${BASH_REMATCH[1]}"
              TYPE="${BASH_REMATCH[2]}"
              
              # Добавляем эмодзи в зависимости от типа
              case "$TYPE" in
                Add) EMOJI="✨" ;;
                Remove) EMOJI="❌" ;;
                Tweak) EMOJI="🔧" ;;
                Fix) EMOJI="🐛" ;;
                *) EMOJI="📝" ;;
              esac
              
              CHANGES="${CHANGES}${EMOJI} **${TYPE}**: ${MESSAGE}\n"
            fi
          done <<< "$(echo -e "$ENTRIES")"
          
          # Создаем JSON для Discord
          cat > discord.json << EOF
          {
            "embeds": [{
              "title": "📝 Новый Changelog #${PR_NUMBER}",
              "description": "**${PR_TITLE}**\n\n${CHANGES}",
              "url": "${PR_URL}",
              "color": 5814783,
              "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")",
              "author": {
                "name": "${AUTHOR}",
                "icon_url": "https://github.com/${PR_USER}.png"
              },
              "fields": [
                {
                  "name": "ID записи",
                  "value": "${NEW_ID}",
                  "inline": true
                },
                {
                  "name": "Автор PR",
                  "value": "[${PR_USER}](${PR_URL})",
                  "inline": true
                }
              ],
              "footer": {
                "text": "Changelog StarryPole"
              }
            }]
          }
          EOF
          
          # Отправляем в Discord
          curl -H "Content-Type: application/json" \
               -X POST \
               -d @discord.json \
               "$DISCORD_WEBHOOK"
          
          echo "Discord webhook sent successfully!"

      - name: Add comment to PR
        if: steps.extract-changelog.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const author = '${{ steps.parse-entries.outputs.AUTHOR }}';
            const prNumber = '${{ env.PR_NUMBER }}';
            const newId = '${{ steps.update-file.outputs.NEW_ID }}';
            
            // Получаем список изменений для комментария
            const entries = `${{ steps.parse-entries.outputs.ENTRIES }}`;
            let changesList = '';
            
            // Парсим изменения для комментария
            const lines = entries.split('\\n');
            for (const line of lines) {
              const match = line.match(/message: \"(.*)\"\s+type: (.*)/);
              if (match) {
                const message = match[1];
                const type = match[2];
                let emoji = '📝';
                if (type === 'Add') emoji = '✨';
                else if (type === 'Remove') emoji = '❌';
                else if (type === 'Tweak') emoji = '🔧';
                else if (type === 'Fix') emoji = '🐛';
                
                changesList += `${emoji} **${type}**: ${message}\n`;
              }
            }
            
            const webhookStatus = process.env.DISCORD_WEBHOOK ? '✅ Отправлено' : '⚠️ Не настроен';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Changelog успешно добавлен!**\n\n**Автор:** ${author}\n**ID записи:** ${newId}\n\n**Изменения:**\n${changesList || 'Не удалось распарсить изменения'}\n\n**Discord Webhook:** ${webhookStatus}\n\nФайл: \`Resources/Changelog/ChangelogStarryPole.yml\``
            });

      - name: Add failure comment
        if: steps.extract-changelog.outputs.found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **Changelog не найден!**\n\nПожалуйста, добавьте changelog в описание PR в формате:\n\`\`\`\n:cl: автор\n- add: Добавлено что-то новое\n- fix: Исправлено что-то\n- tweak: Изменено что-то\n- remove: Удалено что-то\n\`\`\`\n\nChangelog должен находиться между \`:cl:\` и автоматическим комментарием.\n\n**Важно:** Не используйте HTML комментарии (<!-- -->) внутри changelog и не копируйте примеры!`
            });
